<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
        }

        .container {
            max-width: 750px;
            margin: auto;
            background: white;
            border-radius: 14px;
            padding: 35px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #5a67d8;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #434190;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
            color: #5a67d8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Resume & Job Description</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <label for="job_description">Job Description</label>
            <textarea name="job_description" id="job_description" placeholder="Paste job description here..."></textarea>

            <button type="submit">Analyze Resume</button>
        </form>

        <a href="{% url 'home' %}" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
