{% extends "base.html" %}
{% block title %}404 — Page Not Found — AI Resume Analyzer{% endblock %}

{% block content %}
<div style="
    min-height: calc(100vh - var(--nav-height));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
">
    <div style="font-size: 96px; line-height: 1; margin-bottom: 24px;">🔍</div>

    <h1 style="font-size: 5rem; font-weight: 900; letter-spacing: -0.05em; margin-bottom: 8px;
               background: linear-gradient(90deg, var(--clr-brand-from), var(--clr-accent));
               -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
        404
    </h1>

    <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 14px;">Page Not Found</h2>

    <p style="color: var(--clr-text-muted); font-size: 0.97rem; max-width: 400px; line-height: 1.7; margin-bottom: 36px;">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
    </p>

    <div style="display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;">
        <a href="{% url 'home' %}" class="btn btn-primary">← Back to Home</a>
        <a href="{% url 'upload_resume' %}" class="btn btn-secondary">Analyze a Resume</a>
    </div>
</div>
{% endblock %}
